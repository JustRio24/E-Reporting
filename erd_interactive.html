<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full ERD E-Reporting (Notasi Chen)</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style type="text/css">
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #2b2b2b;
            color: #ffffff;
            overflow: hidden;
        }
        #network-container {
            width: 100%;
            height: 100vh;
            border: none;
        }
        #instructions {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 8px;
            z-index: 1000;
            border: 1px solid #555;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            max-width: 320px;
        }
        h3 { margin-top: 0; margin-bottom: 10px; color: #fff;}
        p { margin-bottom: 0; font-size: 13px; line-height: 1.5; color: #ccc;}
    </style>
</head>
<body>
    <div id="instructions">
        <h3>Full Chen Notation ERD</h3>
        <p>Berdasarkan seluruh tabel dan strukturnya.<br><br>
           Gunakan mouse untuk:<br>
           - <strong>Drag & Drop</strong> node untuk merapikan.<br>
           - <strong>Scroll</strong> untuk Zoom In / Zoom Out.</p>
    </div>
    <div id="network-container"></div>

    <script type="text/javascript">
        var nodesData = [
            // Entitas Utama
            {id: 'E_USERS', label: 'USERS', shape: 'box', color: '#5b6b79', font: {color: 'white', size: 16, bold: true}},
            {id: 'E_FACILITIES', label: 'FACILITIES', shape: 'box', color: '#5b6b79', font: {color: 'white', size: 16, bold: true}},
            {id: 'E_FACILITY_CATEGORIES', label: 'FACILITY\nCATEGORIES', shape: 'box', color: '#5b6b79', font: {color: 'white', size: 16, bold: true}},
            {id: 'E_LOCATIONS', label: 'LOCATIONS', shape: 'box', color: '#5b6b79', font: {color: 'white', size: 16, bold: true}},
            {id: 'E_DAMAGE_REPORTS', label: 'DAMAGE\nREPORTS', shape: 'box', color: '#5b6b79', font: {color: 'white', size: 16, bold: true}},
            {id: 'E_DAMAGE_CATEGORIES', label: 'DAMAGE\nCATEGORIES', shape: 'box', color: '#5b6b79', font: {color: 'white', size: 16, bold: true}},
            {id: 'E_DAMAGE_PHOTOS', label: 'DAMAGE\nPHOTOS', shape: 'box', color: '#5b6b79', font: {color: 'white', size: 16, bold: true}},
            {id: 'E_WORK_ORDERS', label: 'WORK\nORDERS', shape: 'box', color: '#5b6b79', font: {color: 'white', size: 16, bold: true}},
            {id: 'E_REPAIR_PROGRESS', label: 'REPAIR\nPROGRESS', shape: 'box', color: '#5b6b79', font: {color: 'white', size: 16, bold: true}},
            {id: 'E_STATUS_HISTORIES', label: 'STATUS\nHISTORIES', shape: 'box', color: '#5b6b79', font: {color: 'white', size: 16, bold: true}},
            {id: 'E_NOTIFICATIONS', label: 'NOTIFICATIONS', shape: 'box', color: '#5b6b79', font: {color: 'white', size: 16, bold: true}},

            // Relasi Belah Ketupat
            {id: 'R_MELAPORKAN', label: 'Melaporkan', shape: 'diamond', color: '#8c7bbb', font: {color: 'white', size: 13}},
            {id: 'R_MENERIMA_TUGAS', label: 'Menerima\nTugas', shape: 'diamond', color: '#8c7bbb', font: {color: 'white', size: 13}},
            {id: 'R_MEMBERI_TUGAS', label: 'Memberi\nTugas', shape: 'diamond', color: '#8c7bbb', font: {color: 'white', size: 13}},
            {id: 'R_MEMPERBARUI', label: 'Memperbarui', shape: 'diamond', color: '#8c7bbb', font: {color: 'white', size: 13}},
            {id: 'R_UBAH_STATUS', label: 'Mengubah\nStatus', shape: 'diamond', color: '#8c7bbb', font: {color: 'white', size: 13}},
            {id: 'R_TERIMA_NOTIF', label: 'Menerima\nNotif', shape: 'diamond', color: '#8c7bbb', font: {color: 'white', size: 13}},
            {id: 'R_MEMILIKI_KATEGORI', label: 'Kategori', shape: 'diamond', color: '#8c7bbb', font: {color: 'white', size: 13}},
            {id: 'R_BERLOKASI', label: 'Berlokasi', shape: 'diamond', color: '#8c7bbb', font: {color: 'white', size: 13}},
            {id: 'R_MENGALAMI', label: 'Mengalami\nKerusakan', shape: 'diamond', color: '#8c7bbb', font: {color: 'white', size: 13}},
            {id: 'R_JENIS_RUSAK', label: 'Jenis', shape: 'diamond', color: '#8c7bbb', font: {color: 'white', size: 13}},
            {id: 'R_LAMPIRAN', label: 'Lampiran', shape: 'diamond', color: '#8c7bbb', font: {color: 'white', size: 13}},
            {id: 'R_TINDAKLANJUT', label: 'Ditindaklanjuti', shape: 'diamond', color: '#8c7bbb', font: {color: 'white', size: 13}},
            {id: 'R_RIWAYAT', label: 'Riwayat', shape: 'diamond', color: '#8c7bbb', font: {color: 'white', size: 13}},
            {id: 'R_PROGRES', label: 'Progres', shape: 'diamond', color: '#8c7bbb', font: {color: 'white', size: 13}}
        ];

        var edgesData = [
            // Garis Relasi Users -> Relasi -> Entitas
            {from: 'E_USERS', to: 'R_MELAPORKAN'}, {from: 'R_MELAPORKAN', to: 'E_DAMAGE_REPORTS'},
            {from: 'E_USERS', to: 'R_MENERIMA_TUGAS'}, {from: 'R_MENERIMA_TUGAS', to: 'E_WORK_ORDERS'},
            {from: 'E_USERS', to: 'R_MEMBERI_TUGAS'}, {from: 'R_MEMBERI_TUGAS', to: 'E_WORK_ORDERS'},
            {from: 'E_USERS', to: 'R_MEMPERBARUI'}, {from: 'R_MEMPERBARUI', to: 'E_REPAIR_PROGRESS'},
            {from: 'E_USERS', to: 'R_UBAH_STATUS'}, {from: 'R_UBAH_STATUS', to: 'E_STATUS_HISTORIES'},
            {from: 'E_USERS', to: 'R_TERIMA_NOTIF'}, {from: 'R_TERIMA_NOTIF', to: 'E_NOTIFICATIONS'},

            // Garis Relasi Facilities
            {from: 'E_FACILITIES', to: 'R_MEMILIKI_KATEGORI'}, {from: 'R_MEMILIKI_KATEGORI', to: 'E_FACILITY_CATEGORIES'},
            {from: 'E_FACILITIES', to: 'R_BERLOKASI'}, {from: 'R_BERLOKASI', to: 'E_LOCATIONS'},
            {from: 'E_FACILITIES', to: 'R_MENGALAMI'}, {from: 'R_MENGALAMI', to: 'E_DAMAGE_REPORTS'},

            // Garis Relasi Damage Reports
            {from: 'E_DAMAGE_REPORTS', to: 'R_JENIS_RUSAK'}, {from: 'R_JENIS_RUSAK', to: 'E_DAMAGE_CATEGORIES'},
            {from: 'E_DAMAGE_REPORTS', to: 'R_LAMPIRAN'}, {from: 'R_LAMPIRAN', to: 'E_DAMAGE_PHOTOS'},
            {from: 'E_DAMAGE_REPORTS', to: 'R_TINDAKLANJUT'}, {from: 'R_TINDAKLANJUT', to: 'E_WORK_ORDERS'},
            {from: 'E_DAMAGE_REPORTS', to: 'R_RIWAYAT'}, {from: 'R_RIWAYAT', to: 'E_STATUS_HISTORIES'},

            // Garis Relasi Work Orders
            {from: 'E_WORK_ORDERS', to: 'R_PROGRES'}, {from: 'R_PROGRES', to: 'E_REPAIR_PROGRESS'}
        ];

        // Daftar Atribut Berdasarkan Seluruh Struktur Tabel
        var tables = {
            'E_USERS': ['id', 'name', 'email', 'email_verified_at', 'password', 'role', 'phone', 'is_active', 'remember_token', 'created_at', 'updated_at'],
            'E_WORK_ORDERS': ['id', 'damage_report_id', 'assigned_to', 'assigned_by', 'assigned_date', 'due_date', 'status', 'notes', 'created_at', 'updated_at'],
            'E_REPAIR_PROGRESS': ['id', 'work_order_id', 'progress_percentage', 'description', 'photo', 'created_by', 'created_at', 'updated_at'],
            'E_NOTIFICATIONS': ['id', 'user_id', 'title', 'message', 'is_read', 'created_at', 'updated_at'],
            'E_STATUS_HISTORIES': ['id', 'damage_report_id', 'old_status', 'new_status', 'changed_by', 'remarks', 'created_at', 'updated_at'],
            'E_DAMAGE_REPORTS': ['id', 'report_number', 'facility_id', 'reporter_id', 'damage_category_id', 'severity', 'title', 'description', 'latitude', 'longitude', 'status', 'reported_at', 'created_at', 'updated_at'],
            'E_FACILITIES': ['id', 'facility_code', 'facility_name', 'facility_category_id', 'location_id', 'description', 'latitude', 'longitude', 'created_at', 'updated_at'],
            'E_FACILITY_CATEGORIES': ['id', 'name', 'description', 'created_at', 'updated_at'],
            'E_DAMAGE_PHOTOS': ['id', 'damage_report_id', 'photo_path', 'caption', 'created_at', 'updated_at'],
            'E_DAMAGE_CATEGORIES': ['id', 'name', 'description', 'created_at', 'updated_at'],
            'E_LOCATIONS': ['id', 'name', 'description', 'latitude', 'longitude', 'created_at', 'updated_at']
        };

        // Otomatis men-generate node dan edge untuk seluruh atribut!
        for (var entityId in tables) {
            var attributes = tables[entityId];
            attributes.forEach(function(attr) {
                var attrId = 'A_' + entityId + '_' + attr;
                var labelText = attr;
                if (attr === 'id') {
                    labelText += '\n(PK)';
                } else if (attr.endsWith('_id') || attr === 'assigned_to' || attr === 'assigned_by' || attr === 'reporter_id' || attr === 'created_by' || attr === 'changed_by' || attr === 'user_id') {
                    labelText += '\n(FK)';
                }

                nodesData.push({
                    id: attrId, 
                    label: labelText, 
                    shape: 'ellipse', 
                    color: '#10568a', 
                    font: {color: 'white', size: 11} // Ukuran font lebih kecil agar tidak menumpuk
                });
                edgesData.push({
                    from: entityId, 
                    to: attrId,
                    color: { color: '#666666', opacity: 0.5 },
                    length: 80 // Tarikan antar entitas dan atribut diperpendek
                });
            });
        }

        // Inisialisasi Network
        var container = document.getElementById('network-container');
        var data = {
            nodes: new vis.DataSet(nodesData),
            edges: new vis.DataSet(edgesData)
        };
        var options = {
            physics: {
                enabled: true,
                barnesHut: {
                    gravitationalConstant: -2000,
                    centralGravity: 0.1,
                    springLength: 120,
                    springConstant: 0.04,
                    damping: 0.09,
                    avoidOverlap: 0.1
                }
            },
            edges: {
                width: 1.5,
                color: { color: '#ffffff', highlight: '#ff5722' },
                smooth: { type: 'continuous' }
            },
            interaction: {
                hover: true,
                tooltipDelay: 200
            }
        };
        
        var network = new vis.Network(container, data, options);

        // Mematikan fisika saat graf sudah dirasa tenang
        network.on("stabilizationIterationsDone", function () {
            network.setOptions( { physics: { enabled: false } } );
        });
    </script>
</body>
</html>
